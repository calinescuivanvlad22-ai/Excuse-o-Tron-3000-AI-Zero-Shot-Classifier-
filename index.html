<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Excuse Detector</title>
    <style>
        :root {
            --bg: #1e1e2f;
            --text: #f8f8f2;
            --primary: #ff79c6;
            --secondary: #bd93f9;
            --card: #282a36;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
            transition: background-color 0.5s, box-shadow 0.5s;
        }
        
        /* The Polygraph Visual Effects */
        .lie-detected {
            background-color: #4a0000 !important;
            animation: shake 0.5s;
            animation-iteration-count: 2;
        }
        .truth-detected {
            background-color: #002b12 !important;
            box-shadow: inset 0 0 50px #50fa7b;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }
        h1 { margin-top: 0; color: var(--primary); }
        textarea { 
            width: 90%; 
            height: 100px; 
            font-size: 16px; 
            padding: 15px; 
            margin: 20px 0; 
            border-radius: 10px; 
            border: 2px solid #44475a; 
            background: var(--bg);
            color: white;
            resize: none;
        }
        textarea:focus { outline: none; border-color: var(--secondary); }
        
        .button-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        button { 
            padding: 12px 20px; 
            font-size: 16px; 
            font-weight: bold;
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 8px; 
            transition: 0.3s;
        }
        button:hover { transform: scale(1.05); }
        
        #analyzeBtn { background: linear-gradient(45deg, var(--primary), var(--secondary)); width: 100%; margin-top: 15px; padding: 15px;}
        #analyzeBtn:disabled { background: #6272a4; cursor: not-allowed; transform: none; }
        
        #surpriseBtn { background: #44475a; border: 1px solid #6272a4; flex: 1;}
        #surpriseBtn:hover { background: #6272a4; }

        #micBtn { background: #ff5555; border: 1px solid #ff5555; flex: 1;}
        #micBtn:hover { background: #ff0000; box-shadow: 0 0 15px #ff5555;}
        .recording { animation: pulse 1.5s infinite; background: #ff0000 !important; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px #ff0000; }
            100% { transform: scale(1); }
        }

        #result { 
            margin-top: 25px; 
            font-size: 20px; 
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .winning-category { font-size: 28px; font-weight: bold; color: #50fa7b; margin: 10px 0;}
        .loading { color: #f1fa8c; font-style: italic; font-size: 18px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Excuse-o-Tron 3000 🎓</h1>
        <p>A <strong>Zero-Shot Classification</strong> app running 100% in your browser.</p>
        
        <textarea id="textInput" placeholder="Ex: I couldn't finish the project because my cat unplugged the Wi-Fi router..."></textarea>
        <br>
        
        <div class="button-group">
            <button id="surpriseBtn">🎲 Surprise Me</button>
            <button id="micBtn">🎙️ Dictate Excuse</button>
        </div>
        <button id="analyzeBtn" disabled>⚙️ Loading AI Engine...</button>
        
        <div id="result"></div>
    </div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.14.0';

        const analyzeBtn = document.getElementById('analyzeBtn');
        const surpriseBtn = document.getElementById('surpriseBtn');
        const micBtn = document.getElementById('micBtn');
        const resultDiv = document.getElementById('result');
        const textInput = document.getElementById('textInput');

        let classifier;

        // --- FEATURE: Random Excuse Generator ---
        const funnyExcuses = [
            "I couldn't write the code because my keyboard is afraid of my fingers.",
            "My Wi-Fi router was abducted by aliens for a firmware update.",
            "I accidentally locked myself in the bathroom and had to negotiate with my cat to open the door.",
            "I tried to compile my code, but my laptop started crying.",
            "A time traveler told me that if I finished this project today, the universe would explode."
        ];

        surpriseBtn.addEventListener('click', () => {
            const randomIndex = Math.floor(Math.random() * funnyExcuses.length);
            textInput.value = funnyExcuses[randomIndex];
            window.speechSynthesis.cancel(); 
            resultDiv.style.display = 'none';
            document.body.className = ''; // Reset background
        });

        // --- NEW FEATURE: Speech-to-Text (Microphone) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                micBtn.innerHTML = '🔴 Listening...';
                micBtn.classList.add('recording');
                textInput.placeholder = 'Listening... Speak clearly into your mic.';
                textInput.value = '';
                document.body.className = ''; // Reset background
                window.speechSynthesis.cancel();
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                textInput.value = transcript;
            };

            recognition.onerror = function(event) {
                console.error("Speech recognition error", event.error);
                alert("Microphone error. Make sure you gave browser permissions!");
            };

            recognition.onend = function() {
                micBtn.innerHTML = '🎙️ Dictate Excuse';
                micBtn.classList.remove('recording');
            };

            micBtn.addEventListener('click', () => {
                recognition.start();
            });
        } else {
            // Hide mic button if browser doesn't support it (e.g. Firefox sometimes)
            micBtn.style.display = 'none';
        }

        // --- Core AI Logic ---
        const categories = [
            "technical issue or bad internet", 
            "blatant lie or made up story", 
            "pure laziness disguised as an excuse", 
            "pet related excuse", 
            "valid and believable reason"
        ];

        async function loadModel() {
            try {
                classifier = await pipeline('zero-shot-classification');
                analyzeBtn.innerHTML = '🔍 Analyze Excuse';
                analyzeBtn.disabled = false;
            } catch (error) {
                analyzeBtn.innerHTML = "Error loading model";
                console.error("AI Error:", error);
            }
        }

        // --- FEATURE: Text-to-Speech ---
        function speakVerdict(category, probability) {
            window.speechSynthesis.cancel();
            const speechText = `Verdict: ${category}. Confidence: ${probability} percent.`;
            const utterance = new SpeechSynthesisUtterance(speechText);
            utterance.lang = 'en-US';
            utterance.pitch = 0.6; 
            utterance.rate = 0.9;  
            window.speechSynthesis.speak(utterance);
        }

        analyzeBtn.addEventListener('click', async () => {
            const text = textInput.value;
            if (!text) return alert("Please type or speak an excuse first!");

            // Reset UI
            document.body.className = ''; 
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div class="loading">Analyzing the cringe level... ⏳</div>';
            analyzeBtn.disabled = true;
            
            // Run AI
            const result = await classifier(text, categories);
            
            const topCategory = result.labels[0];
            const probability = Math.round(result.scores[0] * 100);

            let displayCategory = "";
            let emoji = "";
            
            if (topCategory.includes("technical issue")) { displayCategory = "Classic Tech Issue"; emoji = "🔌"; }
            else if (topCategory.includes("blatant lie")) { 
                displayCategory = "Blatant Lie"; emoji = "🚨"; 
                document.body.classList.add('lie-detected'); // Trigger Red Shake
            }
            else if (topCategory.includes("pure laziness")) { displayCategory = "Pure Laziness"; emoji = "🦥"; }
            else if (topCategory.includes("pet related")) { displayCategory = "Blamed the Pet"; emoji = "🐕"; }
            else { 
                displayCategory = "Valid Excuse"; emoji = "✅"; 
                document.body.classList.add('truth-detected'); // Trigger Green Glow
            }

            resultDiv.innerHTML = `
                <div>AI Verdict:</div>
                <div class="winning-category">${emoji} ${displayCategory}</div>
                <div style="font-size: 16px; color: #8be9fd;">Model Confidence: ${probability}%</div>
            `;
            
            speakVerdict(displayCategory, probability);
            analyzeBtn.disabled = false;
        });

        loadModel();
    </script>

</body>
</html>
