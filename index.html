<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Excuse Detector</title>
    <style>
        :root {
            --bg: #1e1e2f;
            --text: #f8f8f2;
            --primary: #ff79c6;
            --secondary: #bd93f9;
            --card: #282a36;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { margin-top: 0; color: var(--primary); }
        textarea { 
            width: 90%; 
            height: 100px; 
            font-size: 16px; 
            padding: 15px; 
            margin: 20px 0; 
            border-radius: 10px; 
            border: 2px solid #44475a; 
            background: var(--bg);
            color: white;
            resize: none;
        }
        textarea:focus { outline: none; border-color: var(--secondary); }
        
        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        button { 
            padding: 15px 25px; 
            font-size: 18px; 
            font-weight: bold;
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 8px; 
            transition: 0.3s;
        }
        button:hover { transform: scale(1.05); }
        
        #analyzeBtn { background: linear-gradient(45deg, var(--primary), var(--secondary)); }
        #analyzeBtn:disabled { background: #6272a4; cursor: not-allowed; transform: none; }
        
        #surpriseBtn { background: #44475a; border: 1px solid #6272a4; }
        #surpriseBtn:hover { background: #6272a4; }

        #result { 
            margin-top: 25px; 
            font-size: 20px; 
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .winning-category { font-size: 28px; font-weight: bold; color: #50fa7b; margin: 10px 0;}
        .loading { color: #f1fa8c; font-style: italic; font-size: 18px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Excuse-o-Tron 3000 🎓</h1>
        <p>A <strong>Zero-Shot Classification</strong> app running 100% in your browser.</p>
        
        <textarea id="textInput" placeholder="Ex: I couldn't finish the project because my cat unplugged the Wi-Fi router..."></textarea>
        <br>
        
        <div class="button-group">
            <button id="surpriseBtn">🎲 Surprise Me</button>
            <button id="analyzeBtn" disabled>⚙️ Loading AI Engine...</button>
        </div>
        
        <div id="result"></div>
    </div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.14.0';

        const analyzeBtn = document.getElementById('analyzeBtn');
        const surpriseBtn = document.getElementById('surpriseBtn');
        const resultDiv = document.getElementById('result');
        const textInput = document.getElementById('textInput');

        let classifier;

        // --- NEW FEATURE 1: Random Excuse Generator ---
        const funnyExcuses = [
            "I couldn't write the code because my keyboard is afraid of my fingers.",
            "My Wi-Fi router was abducted by aliens for a firmware update.",
            "I accidentally locked myself in the bathroom and had to negotiate with my cat to open the door.",
            "I tried to compile my code, but my laptop started crying.",
            "A time traveler told me that if I finished this project today, the universe would explode.",
            "My goldfish was feeling depressed so I had to stay and comfort him."
        ];

        surpriseBtn.addEventListener('click', () => {
            // Pick a random excuse and put it in the text box
            const randomIndex = Math.floor(Math.random() * funnyExcuses.length);
            textInput.value = funnyExcuses[randomIndex];
            
            // Optional: Stop any currently speaking voice so they don't overlap
            window.speechSynthesis.cancel(); 
            resultDiv.style.display = 'none';
        });

        // The categories the AI will use
        const categories = [
            "technical issue or bad internet", 
            "blatant lie or made up story", 
            "pure laziness disguised as an excuse", 
            "pet related excuse", 
            "valid and believable reason"
        ];

        // Load the AI model
        async function loadModel() {
            try {
                classifier = await pipeline('zero-shot-classification');
                analyzeBtn.innerHTML = '🔍 Analyze Excuse';
                analyzeBtn.disabled = false;
            } catch (error) {
                analyzeBtn.innerHTML = "Error loading model";
                console.error("AI Error:", error);
            }
        }

        // --- NEW FEATURE 3: Text-to-Speech Function ---
        function speakVerdict(category, probability) {
            // Stop any previous speech
            window.speechSynthesis.cancel();

            // Create the sentence the robot will say
            const speechText = `AI Verdict: ${category}. Confidence level: ${probability} percent.`;
            
            const utterance = new SpeechSynthesisUtterance(speechText);
            utterance.lang = 'en-US';
            utterance.pitch = 0.7; // Lower pitch to sound more robotic/serious
            utterance.rate = 0.9;  // Slightly slower speaking rate
            
            window.speechSynthesis.speak(utterance);
        }

        analyzeBtn.addEventListener('click', async () => {
            const text = textInput.value;
            if (!text) return alert("Please type an excuse first!");

            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div class="loading">Analyzing the cringe level... ⏳</div>';
            analyzeBtn.disabled = true;
            
            // Run the AI model
            const result = await classifier(text, categories);
            
            // Extract the top category
            const topCategory = result.labels[0];
            const probability = Math.round(result.scores[0] * 100);

            // Format for UI presentation
            let displayCategory = "";
            let emoji = "";
            if (topCategory.includes("technical issue")) { displayCategory = "Classic Tech Issue"; emoji = "🔌"; }
            else if (topCategory.includes("blatant lie")) { displayCategory = "Blatant Lie"; emoji = "🤥"; }
            else if (topCategory.includes("pure laziness")) { displayCategory = "Pure Laziness"; emoji = "🦥"; }
            else if (topCategory.includes("pet related")) { displayCategory = "Blamed the Pet"; emoji = "🐕"; }
            else { displayCategory = "Valid Excuse (Credible)"; emoji = "✅"; }

            resultDiv.innerHTML = `
                <div>AI Verdict:</div>
                <div class="winning-category">${emoji} ${displayCategory}</div>
                <div style="font-size: 16px; color: #8be9fd;">Model Confidence: ${probability}%</div>
            `;
            
            // Call the robot voice!
            speakVerdict(displayCategory, probability);
            
            analyzeBtn.disabled = false;
        });

        loadModel();
    </script>

</body>
</html>
