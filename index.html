<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Excuse Detector</title>
    <style>
        :root {
            --bg: #1e1e2f;
            --text: #f8f8f2;
            --primary: #ff79c6;
            --secondary: #bd93f9;
            --card: #282a36;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
            transition: background-color 0.5s, box-shadow 0.5s;
        }
        
        .lie-detected {
            background-color: #4a0000 !important;
            animation: shake 0.5s;
            animation-iteration-count: 2;
        }
        .truth-detected {
            background-color: #002b12 !important;
            box-shadow: inset 0 0 50px #50fa7b;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }
        h1 { margin-top: 0; color: var(--primary); }
        
        /* NEW: Dropdown Styling */
        select {
            width: 90%;
            padding: 12px;
            margin-top: 10px;
            font-size: 16px;
            border-radius: 8px;
            background: var(--bg);
            color: white;
            border: 2px solid var(--secondary);
            cursor: pointer;
            outline: none;
        }
        select:focus { border-color: var(--primary); }

        textarea { 
            width: 90%; 
            height: 100px; 
            font-size: 16px; 
            padding: 15px; 
            margin: 15px 0; 
            border-radius: 10px; 
            border: 2px solid #44475a; 
            background: var(--bg);
            color: white;
            resize: none;
        }
        textarea:focus { outline: none; border-color: var(--secondary); }
        
        .button-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        button { 
            padding: 12px 20px; 
            font-size: 16px; 
            font-weight: bold;
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 8px; 
            transition: 0.3s;
        }
        button:hover { transform: scale(1.05); }
        
        #analyzeBtn { background: linear-gradient(45deg, var(--primary), var(--secondary)); width: 100%; margin-top: 15px; padding: 15px;}
        #analyzeBtn:disabled { background: #6272a4; cursor: not-allowed; transform: none; }
        
        #surpriseBtn { background: #44475a; border: 1px solid #6272a4; flex: 1;}
        #surpriseBtn:hover { background: #6272a4; }

        #micBtn { background: #ff5555; border: 1px solid #ff5555; flex: 1;}
        #micBtn:hover { background: #ff0000; box-shadow: 0 0 15px #ff5555;}
        .recording { animation: pulse 1.5s infinite; background: #ff0000 !important; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px #ff0000; }
            100% { transform: scale(1); }
        }

        #result { 
            margin-top: 25px; 
            font-size: 20px; 
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .winning-category { font-size: 28px; font-weight: bold; color: #50fa7b; margin: 10px 0;}
        .loading { color: #f1fa8c; font-style: italic; font-size: 18px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Excuse-o-Tron 3000 🎓</h1>
        <p>A <strong>Zero-Shot Classification</strong> app running 100% in your browser.</p>
        
        <select id="excuseCategory">
            <option value="random">🎲 Any Situation (Random)</option>
            <option value="work">🏢 Late to Work</option>
            <option value="school">🎒 Missed Assignment/School</option>
            <option value="meeting">📅 Skipped a Meeting</option>
            <option value="social">🍻 Avoiding a Social Event</option>
        </select>

        <textarea id="textInput" placeholder="Ex: I couldn't finish the project because my cat unplugged the Wi-Fi router..."></textarea>
        <br>
        
        <div class="button-group">
            <button id="surpriseBtn">✨ Generate Excuse</button>
            <button id="micBtn">🎙️ Dictate Excuse</button>
        </div>
        <button id="analyzeBtn" disabled>⚙️ Loading AI Engine...</button>
        
        <div id="result"></div>
    </div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.14.0';

        const analyzeBtn = document.getElementById('analyzeBtn');
        const surpriseBtn = document.getElementById('surpriseBtn');
        const micBtn = document.getElementById('micBtn');
        const resultDiv = document.getElementById('result');
        const textInput = document.getElementById('textInput');
        const categoryDropdown = document.getElementById('excuseCategory'); // Dropdown Element

        let classifier;

        // --- UPGRADED FEATURE: Categorized Excuse Dictionary ---
        const smartExcuses = {
            work: [
                "I'm running late because there was a rogue swan blocking the highway.",
                "My alarm went off, but my cat turned it off to teach me a lesson.",
                "I got stuck in an elevator with a guy explaining cryptocurrency to me.",
                "My car wouldn't start because it’s updating its terms and conditions."
            ],
            school: [
                "My dog didn't eat my homework, but he did judge it very harshly.",
                "I accidentally compiled my essay into machine code and couldn't reverse it.",
                "The Wi-Fi router was abducted by aliens for a firmware update.",
                "I couldn't write the code because my keyboard is afraid of my fingers."
            ],
            meeting: [
                "I can't make the meeting, I'm currently negotiating peace with my printer.",
                "I have a sudden and fatal allergy to corporate synergy and action items.",
                "I am trapped under a very heavy, sleeping dog and the law says I cannot move.",
                "My webcam decided to only display me as a talking potato."
            ],
            social: [
                "I'd love to come, but I have already put on my comfortable sweatpants.",
                "I can't make it, I need to wash my hair... and my cat's hair.",
                "My social battery is currently at 1% and I cannot find the charger.",
                "A time traveler told me that if I attend this party, the universe will explode."
            ]
        };

        // When "Generate Excuse" is clicked
        surpriseBtn.addEventListener('click', () => {
            let selectedCategory = categoryDropdown.value;

            // If random, pick a random category key
            if (selectedCategory === "random") {
                const keys = Object.keys(smartExcuses);
                selectedCategory = keys[Math.floor(Math.random() * keys.length)];
            }

            // Get the list of excuses for the chosen category and pick one
            const excusesList = smartExcuses[selectedCategory];
            const randomIndex = Math.floor(Math.random() * excusesList.length);
            
            textInput.value = excusesList[randomIndex];
            
            // Reset UI states
            window.speechSynthesis.cancel(); 
            resultDiv.style.display = 'none';
            document.body.className = ''; 
        });

        // --- Speech-to-Text (Microphone) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                micBtn.innerHTML = '🔴 Listening...';
                micBtn.classList.add('recording');
                textInput.placeholder = 'Listening... Speak clearly into your mic.';
                textInput.value = '';
                document.body.className = ''; 
                window.speechSynthesis.cancel();
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                textInput.value = transcript;
            };

            recognition.onerror = function(event) {
                console.error("Speech recognition error", event.error);
                alert("Microphone error. Make sure you gave browser permissions!");
            };

            recognition.onend = function() {
                micBtn.innerHTML = '🎙️ Dictate Excuse';
                micBtn.classList.remove('recording');
            };

            micBtn.addEventListener('click', () => {
                recognition.start();
            });
        } else {
            micBtn.style.display = 'none';
        }

        // --- Core AI Logic ---
        const categories = [
            "technical issue or bad internet", 
            "blatant lie or made up story", 
            "pure laziness disguised as an excuse", 
            "pet related excuse", 
            "valid and believable reason"
        ];

        async function loadModel() {
            try {
                classifier = await pipeline('zero-shot-classification');
                analyzeBtn.innerHTML = '🔍 Analyze Excuse';
                analyzeBtn.disabled = false;
            } catch (error) {
                analyzeBtn.innerHTML = "Error loading model";
                console.error("AI Error:", error);
            }
        }

        // --- Text-to-Speech ---
        function speakVerdict(category, probability) {
            window.speechSynthesis.cancel();
            const speechText = `Verdict: ${category}. Confidence: ${probability} percent.`;
            const utterance = new SpeechSynthesisUtterance(speechText);
            utterance.lang = 'en-US';
            utterance.pitch = 0.6; 
            utterance.rate = 0.9;  
            window.speechSynthesis.speak(utterance);
        }

        analyzeBtn.addEventListener('click', async () => {
            const text = textInput.value;
            if (!text) return alert("Please type or speak an excuse first!");

            document.body.className = ''; 
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div class="loading">Analyzing the cringe level... ⏳</div>';
            analyzeBtn.disabled = true;
            
            const result = await classifier(text, categories);
            
            const topCategory = result.labels[0];
            const probability = Math.round(result.scores[0] * 100);

            let displayCategory = "";
            let emoji = "";
            
            if (topCategory.includes("technical issue")) { displayCategory = "Classic Tech Issue"; emoji = "🔌"; }
            else if (topCategory.includes("blatant lie")) { 
                displayCategory = "Blatant Lie"; emoji = "🚨"; 
                document.body.classList.add('lie-detected');
            }
            else if (topCategory.includes("pure laziness")) { displayCategory = "Pure Laziness"; emoji = "🦥"; }
            else if (topCategory.includes("pet related")) { displayCategory = "Blamed the Pet"; emoji = "🐕"; }
            else { 
                displayCategory = "Valid Excuse"; emoji = "✅"; 
                document.body.classList.add('truth-detected');
            }

            resultDiv.innerHTML = `
                <div>AI Verdict:</div>
                <div class="winning-category">${emoji} ${displayCategory}</div>
                <div style="font-size: 16px; color: #8be9fd;">Model Confidence: ${probability}%</div>
            `;
            
            speakVerdict(displayCategory, probability);
            analyzeBtn.disabled = false;
        });

        loadModel();
    </script>

</body>
</html>
